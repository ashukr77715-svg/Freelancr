# Render Blueprint — deploys the whole app (Express API + built React frontend)
# as one Node web service. Secrets are set in the Render dashboard.
services:
  - type: web
    name: freelancr
    runtime: node
    plan: free
    region: singapore
    branch: main
    # --include=dev: build needs TypeScript/@types/Vite (devDependencies),
    # which NODE_ENV=production would otherwise skip.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard (Environment tab):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: SERVER_PUBLIC_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
